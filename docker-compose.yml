services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-launchproof}
      POSTGRES_USER: ${POSTGRES_USER:-launchproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the untracked .env file}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - launchproof-db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:?Set BUILD_COMMIT_SHA to the exact 40-character commit}
    env_file: .env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-launchproof}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the untracked .env file}@postgres:5432/${POSTGRES_DB:-launchproof}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:?Set BUILD_COMMIT_SHA to the exact 40-character commit}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_XLAYER_RPC_URL: ${NEXT_PUBLIC_XLAYER_RPC_URL:-}
        NEXT_PUBLIC_REGISTRY_ADDRESS: ${NEXT_PUBLIC_REGISTRY_ADDRESS:-}
        NEXT_PUBLIC_PAYOUT_ADDRESS: ${NEXT_PUBLIC_PAYOUT_ADDRESS:-}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-1952}
        NEXT_PUBLIC_REGISTRY_DEPLOYMENT_BLOCK: ${NEXT_PUBLIC_REGISTRY_DEPLOYMENT_BLOCK:-0}
        NEXT_PUBLIC_WEB_BASE_URL: ${NEXT_PUBLIC_WEB_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_SOURCE_REPOSITORY: ${NEXT_PUBLIC_SOURCE_REPOSITORY:-}
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  launchproof-db:
