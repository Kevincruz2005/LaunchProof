name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @launchproof/backend exec prisma generate
      - name: Validate operational scripts
        run: |
          for script in scripts/*.sh; do bash -n "$script"; done
          for script in scripts/*.mjs; do node --check "$script"; done
      - run: pnpm contract:build
      - run: git diff --exit-code -- schema/registry.abi.json
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - run: forge fmt --check
      - run: forge build
      - run: forge test -vvv

  xlayer-testnet-e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: xlayer-testnet
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/verify-run.sh "$RUN_ID"
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
          RUN_ID: ${{ secrets.XLAYER_TESTNET_RUN_ID }}
